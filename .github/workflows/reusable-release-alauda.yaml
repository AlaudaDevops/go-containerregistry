name: Reusable Release Alauda

on:  # yamllint disable-line rule:truthy
  workflow_call: {}

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: alauda-release-crane
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build and release Alauda crane binaries
        uses: goreleaser/goreleaser-action@v6.4.0
        with:
          version: "~> v1.19"
          args: release --rm-dist -f=.goreleaser-alauda.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
