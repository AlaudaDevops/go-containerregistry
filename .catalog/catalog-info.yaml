apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: tektoncd-tools-go-containerregistry
  title: Tektoncd Tools - go-containerregistry (crane)
  description: go-containerregistry 提供 crane 等容器镜像操作 CLI，在 Tekton 任务镜像中用于镜像复制、推送和 OCI 制品处理。
  tags:
    - tool
    - container
    - open-source-fork
  links:
    - url: https://github.com/AlaudaDevops/go-containerregistry
      title: GitHub Repository
      icon: github
    - url: https://build-sonar.alauda.cn/dashboard?id=github.com-AlaudaDevops-go-containerregistry
      title: SonarQube
      icon: dashboard
    - url: https://github.com/google/go-containerregistry
      title: Upstream Repository
      icon: github
  annotations:
    # github plugin
    github.com/project-slug: AlaudaDevops/go-containerregistry
    # sonarqube plugin
    sonarqube.org/project-key: github.com-AlaudaDevops-go-containerregistry
    # 开源组件代码仓库地址，格式：${url}/${project}/${repo}
    acp.cpaas.io/open-source-component-repo: https://github.com/google/go-containerregistry
    # 开源组件的版本信息，只适用于开源组件，自研组件默认不收集版本信息,格式 ${version}
    acp.cpaas.io/open-source-component-version: v0.21.0
    # 开源组件的license信息,格式 ${license}
    acp.cpaas.io/open-source-component-license: Apache
    # 开源组件的license地址,格式 ${url}/${project}/${repo}/${license-path}
    acp.cpaas.io/open-source-component-license_url: https://github.com/google/go-containerregistry/blob/main/LICENSE
    # backstage techdocs plugin
    backstage.io/techdocs-ref: dir:../
    acp.cpaas.io/owner: yksun@alauda.io

    # 组件属性，区别是否部署时必带的核心组件,可选值为 core 和 plugin。
    acp.cpaas.io/functional-attributes: plugin

spec:
  type: service
  system: system:alauda-devops-system
  lifecycle: production
  owner: devops
